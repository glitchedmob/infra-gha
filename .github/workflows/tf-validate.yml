name: Terraform Validate

on:
  workflow_call:
    inputs:
      repo-root:
        description: Path to repo root containing the Makefile
        required: false
        type: string
        default: .
      init-backend:
        description: Enable backend during tofu init
        required: false
        type: boolean
        default: true
    secrets:
      envrc_content:
        description: Content to write to .envrc file (optional)
        required: false
      aws_role_arn:
        description: AWS role ARN for credentials
        required: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_ROLE_ARN: ${{ secrets.aws_role_arn }}
    steps:
      - uses: actions/checkout@v6

      - name: Write .envrc
        env:
          ENVRC_CONTENT: ${{ secrets.envrc_content }}
        run: |
          if [ -n "$ENVRC_CONTENT" ]; then
            echo "$ENVRC_CONTENT" > .envrc
          fi

      - uses: aws-actions/configure-aws-credentials@v6
        if: ${{ env.AWS_ROLE_ARN != '' }}
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          aws-region: us-east-2

      - uses: opentofu/setup-opentofu@v2

      - name: Init
        working-directory: ${{ inputs.repo-root }}
        run: |
          if [ "${{ inputs.init-backend }}" = "true" ]; then
            make tf-init
          else
            make tf-init ARGS="-backend=false"
          fi

      - name: Validate
        working-directory: ${{ inputs.repo-root }}
        run: make tf-validate

      - name: Format check
        working-directory: ${{ inputs.repo-root }}
        run: make tf-format
