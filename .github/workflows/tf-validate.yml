name: Terraform Validate

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory containing TF code
        required: true
        type: string
      tofu-version-file:
        description: Path to .tofu-version file relative to working-directory
        required: false
        type: string
        default: .tofu-version
      init-backend:
        description: Enable backend during tofu init
        required: false
        type: boolean
        default: true
    secrets:
      aws_role_arn:
        description: AWS role ARN for credentials
        required: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        if: ${{ secrets.aws_role_arn != '' }}
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          aws-region: us-east-2

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version_file: ${{ inputs.working-directory }}/${{ inputs.tofu-version-file }}

      - name: Init
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ "${{ inputs.init-backend }}" = "true" ]; then
            tofu init
          else
            tofu init -backend=false
          fi

      - name: Validate
        working-directory: ${{ inputs.working-directory }}
        run: tofu validate

      - name: Format check
        working-directory: ${{ inputs.working-directory }}
        run: tofu fmt -check -recursive
