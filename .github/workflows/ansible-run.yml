name: Run Ansible Playbook

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory containing Ansible code
        required: true
        type: string
      playbook:
        description: Playbook filename (relative to playbooks/ directory)
        required: true
        type: string
      use-ssh-key:
        description: Whether to use SSH key from secrets
        required: false
        type: boolean
        default: false
      use-vault:
        description: Whether to use vault password from secrets
        required: false
        type: boolean
        default: false
    secrets:
      envrc_content:
        description: Content to write to .envrc file (optional)
        required: false
      ssh_key:
        description: SSH private key for Ansible
        required: false
      vault_password:
        description: Ansible vault password
        required: false
      output_encryption_key:
        description: Key for encrypting output artifacts
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Write .envrc
        env:
          ENVRC_CONTENT: ${{ secrets.envrc_content }}
        run: |
          if [ -n "$ENVRC_CONTENT" ]; then
            echo "$ENVRC_CONTENT" > .envrc
          fi

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          working-directory: ${{ inputs.working-directory }}

      - uses: actions/cache@v5
        with:
          path: ${{ inputs.working-directory }}/collections
          key: ansible-collections-${{ runner.os }}-${{ hashFiles(format('{0}/requirements.yml', inputs.working-directory)) }}

      - name: Install deps
        run: make ansible-install

      - name: Setup SSH key
        if: ${{ inputs.use-ssh-key }}
        env:
          SSH_KEY: ${{ secrets.ssh_key }}
        run: |
          key_path="$RUNNER_TEMP/ansible-ssh-key"
          echo "$SSH_KEY" > "$key_path"
          chmod 600 "$key_path"
          echo "ANSIBLE_PRIVATE_KEY_FILE=$key_path" >> "$GITHUB_ENV"

      - name: Setup vault password
        if: ${{ inputs.use-vault }}
        env:
          VAULT_PASS: ${{ secrets.vault_password }}
        run: |
          vault_path="$RUNNER_TEMP/.vault-pass"
          echo "$VAULT_PASS" > "$vault_path"
          echo "ANSIBLE_VAULT_PASSWORD_FILE=$vault_path" >> "$GITHUB_ENV"

      - name: Prepare output directory
        run: |
          output_dir="$RUNNER_TEMP/output"
          mkdir -p "$output_dir"
          {
            echo "OUTPUT_ARTIFACT_DIR=$output_dir"
            echo "ANSIBLE_LOG_MANIFEST=$output_dir/ansible-logs.txt"
            echo "ANSIBLE_STATUS_PATH=$output_dir/ansible-status.txt"
          } >> "$GITHUB_ENV"
          : > "$output_dir/ansible-logs.txt"
          : > "$output_dir/ansible-status.txt"

      - name: Check encryption key
        id: check-key
        env:
          KEY: ${{ secrets.output_encryption_key }}
        run: |
          if [ -n "${KEY:-}" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run playbook
        env:
          ANSIBLE_STDOUT_CALLBACK: community.general.diy
          ANSIBLE_CALLBACKS_ENABLED: community.general.log_plays
          ANSIBLE_CALLBACK_DIY_PLAYBOOK_ON_START_MSG: ""
          ANSIBLE_CALLBACK_DIY_PLAYBOOK_ON_PLAY_START_MSG: ""
          ANSIBLE_CALLBACK_DIY_PLAYBOOK_ON_SETUP_MSG: ""
          ANSIBLE_CALLBACK_DIY_PLAYBOOK_ON_INCLUDE_MSG: ""
          ANSIBLE_CALLBACK_DIY_PLAYBOOK_ON_NOTIFY_MSG: ""
          ANSIBLE_CALLBACK_DIY_PLAYBOOK_ON_NO_HOSTS_MATCHED_MSG: ""
          ANSIBLE_CALLBACK_DIY_PLAYBOOK_ON_NO_HOSTS_REMAINING_MSG: ""
          ANSIBLE_CALLBACK_DIY_PLAYBOOK_ON_STATS_MSG: ""
          ANSIBLE_CALLBACK_DIY_PLAYBOOK_ON_HANDLER_TASK_START_MSG: "TASK [{{ ansible_callback_diy.task.name }}]"
          ANSIBLE_CALLBACK_DIY_PLAYBOOK_ON_TASK_START_MSG: "TASK [{{ ansible_callback_diy.task.name }}]"
          ANSIBLE_CALLBACK_DIY_RUNNER_ON_OK_MSG: "{{ 'changed' if ansible_callback_diy.result.is_changed else 'ok' }}: [{{ ansible_callback_diy.result.host.name if ansible_callback_diy.result.host is not none else 'unknown' }}]"
          ANSIBLE_CALLBACK_DIY_RUNNER_ON_SKIPPED_MSG: "skipped: [{{ ansible_callback_diy.result.host.name if ansible_callback_diy.result.host is not none else 'unknown' }}]"
          ANSIBLE_CALLBACK_DIY_RUNNER_ON_FAILED_MSG: "failed: [{{ ansible_callback_diy.result.host.name if ansible_callback_diy.result.host is not none else 'unknown' }}]"
          ANSIBLE_CALLBACK_DIY_RUNNER_ON_UNREACHABLE_MSG: "unreachable: [{{ ansible_callback_diy.result.host.name if ansible_callback_diy.result.host is not none else 'unknown' }}]"
          ANSIBLE_CALLBACK_DIY_RUNNER_ON_NO_HOSTS_MSG: ""
          ANSIBLE_CALLBACK_DIY_RUNNER_ON_START_MSG: ""
        run: |
          set -euo pipefail
          playbook="${{ inputs.playbook }}"
          playbook_slug=$(printf '%s' "$playbook" | tr '/.' '__')
          log_path="$OUTPUT_ARTIFACT_DIR/ansible-$playbook_slug.txt"
          host_log_dir="$OUTPUT_ARTIFACT_DIR/ansible-$playbook_slug-hosts"
          summary_path="$OUTPUT_ARTIFACT_DIR/ansible-$playbook_slug-summary.txt"
          mkdir -p "$host_log_dir"
          echo "$log_path" >> "$ANSIBLE_LOG_MANIFEST"
          status=0
          set +e
          ANSIBLE_LOG_FOLDER="$host_log_dir" ANSIBLE_NOCOLOR=1 make ansible PLAYBOOK="$playbook" 2>&1 | tee "$summary_path"
          status=${PIPESTATUS[0]}
          set -e
          printf '===== Ansible playbook: %s =====\n' "$playbook" > "$log_path"
          shopt -s nullglob
          for host_log in "$host_log_dir"/*; do
            [ -f "$host_log" ] || continue
            printf -- '----- Host: %s -----\n' "$(basename "$host_log")" >> "$log_path"
            cat "$host_log" >> "$log_path"
          done
          shopt -u nullglob
          printf '%s|%s\n' "$playbook" "$status" >> "$ANSIBLE_STATUS_PATH"
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi

      - name: Encrypt output
        if: ${{ always() && steps.check-key.outputs.has_key == 'true' }}
        env:
          KEY: ${{ secrets.output_encryption_key }}
        run: |
          set -euo pipefail
          while IFS= read -r log_path; do
            [ -n "$log_path" ] || continue
            openssl enc -aes-256-cbc -pbkdf2 -salt \
              -in "$log_path" \
              -out "$log_path.enc" \
              -pass "pass:${KEY}"
          done < "$ANSIBLE_LOG_MANIFEST"

      - name: Upload encrypted artifacts
        if: ${{ always() && steps.check-key.outputs.has_key == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: ansible-output-${{ inputs.playbook }}
          path: |
            ${{ env.OUTPUT_ARTIFACT_DIR }}/ansible-*.txt.enc
          if-no-files-found: ignore

      - name: Build results summary
        if: ${{ always() }}
        run: |
          set -euo pipefail
          playbook="${{ inputs.playbook }}"
          playbook_slug=$(printf '%s' "$playbook" | tr '/.' '__')
          summary_path="$OUTPUT_ARTIFACT_DIR/ansible-$playbook_slug-summary.txt"
          status="unknown"

          if [ -f "$ANSIBLE_STATUS_PATH" ]; then
            while IFS='|' read -r status_playbook status_code; do
              [ -n "$status_playbook" ] || continue
              if [ "$status_playbook" = "$playbook" ]; then
                status="$status_code"
                break
              fi
            done < "$ANSIBLE_STATUS_PATH"
          fi

          emoji="⚠️"
          label="unknown"
          if [ "$status" = "0" ]; then
            emoji="✅"
            label="success"
          elif [ "$status" != "unknown" ]; then
            emoji="❌"
            label="failed"
          fi

          artifacts_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          {
            echo "## Ansible results"
            echo ""
            echo "- $emoji \`$playbook\` ($label)"
            echo ""
            echo "<details>"
            echo "<summary>Logs: $playbook</summary>"
            echo ""
            echo "\`\`\`"
            if [ -f "$summary_path" ]; then
              cat "$summary_path"
            else
              echo "No Ansible summary output found."
            fi
            echo "\`\`\`"
            echo "</details>"
            if [ "${{ steps.check-key.outputs.has_key }}" = "true" ]; then
              log_name="ansible-$playbook_slug.txt"
              echo ""
              echo "Artifacts: $artifacts_url"
              echo "Decrypt artifact: \`openssl enc -d -aes-256-cbc -pbkdf2 -in $log_name.enc -out $log_name -pass pass:\$OUTPUT_ENCRYPTION_KEY\`"
            fi
            echo ""
          } > ansible-results.txt

          cat ansible-results.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Post Ansible comment
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: ansible-${{ inputs.playbook }}
          path: ansible-results.txt
          hide_and_recreate: true
          hide_classify: OUTDATED

      - name: Cleanup
        if: always()
        run: |
          rm -f "$ANSIBLE_PRIVATE_KEY_FILE" "$ANSIBLE_VAULT_PASSWORD_FILE" || true
