name: CI

on:
  pull_request:
    paths:
      - .github/workflows/**
      - .github/actions/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
      - .github/actions/**

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: raven-actions/actionlint@v2
